name: HermesCompanion
options:
  bundleIdPrefix: com.chibitek.hermescompanion
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "26.0"
    ENABLE_BITCODE: NO
    SWIFT_TREAT_WARNINGS_AS_ERRORS: NO
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor

targets:
  HermesCompanion:
    type: application
    platform: iOS
    sources:
      - path: Sources
        excludes:
          - "Info.plist"
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: Hermes
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSMicrophoneUsageDescription: "Microphone access lets Hermes hear voice messages, detect Hey Hermes while the app is open or in the background, and enable hands-free voice conversation."
        NSCameraUsageDescription: "Camera is used to send photos to Hermes for analysis."
        NSSpeechRecognitionUsageDescription: "Speech recognition is used to transcribe your voice messages."
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        UISupportedInterfaceOrientations~ipad: [UIInterfaceOrientationPortrait, UIInterfaceOrientationPortraitUpsideDown, UIInterfaceOrientationLandscapeLeft, UIInterfaceOrientationLandscapeRight]
        UILaunchScreen: {}
        NSAppTransportSecurity:
          # Tailscale uses 100.64.0.0/10 (CGNAT) which iOS does NOT treat as
          # local networking, so NSAllowsLocalNetworking alone blocks it.
          # The app connects to user-configured servers over HTTP (Tailscale).
          # Use NSAllowsArbitraryLoads until we enforce HTTPS on the gateway.
          NSAllowsArbitraryLoads: true
        UIBackgroundModes:
          - audio
          - fetch
          - processing
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.chibitek.hermescompanion
        MARKETING_VERSION: "1.8.35"
        CURRENT_PROJECT_VERSION: 89
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
        ENABLE_PREVIEWS: YES
        DEBUG_INFORMATION_FORMAT: dwarf
        LLVM_DEBUG_SYMBOLS: NO
        GCC_OPTIMIZATION_LEVEL: 0
  HermesCompanionTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    dependencies:
      - target: HermesCompanion
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.chibitek.hermescompanion.tests
        GENERATE_INFOPLIST_FILE: YES
